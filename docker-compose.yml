services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly no
    volumes:
      - redis_data:/data

  bot:
    build: .
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - bot_data:/app/data
    restart: unless-stopped

volumes:
  redis_data:
  bot_data:
